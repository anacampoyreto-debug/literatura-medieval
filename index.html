<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Literatura Medieval 3º ESO · Recuperación</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>LITERATURA MEDIEVAL — 3º ESO</h1>
    <p class="intro">Modo examen de recuperación. Elige cuántas preguntas quieres, pulsa Aplicar, responde y corrige.</p>

    <section class="controls">
      <label for="numQuestions">Preguntas del examen</label>
      <input type="number" id="numQuestions" min="1" max="10" value="10">
      <div class="buttons">
        <button id="applyBtn">Aplicar</button>
        <button id="gradeBtn">Corregir examen</button>
        <button id="resetBtn">Reiniciar</button>
      </div>
    </section>

    <section id="exam"></section>
    <section id="score" class="score"></section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
